name = "letterboxd-rolodex"
main = "index.js"
# Pinned to what the installed wrangler (4.28.1) actually supports; anything
# later just warns and falls back. Nothing here needs newer runtime features.
compatibility_date = "2025-08-03"

[dev]
port = 8788

# Curated rolodex + derived caches. Create the namespaces and paste the ids:
#   npx wrangler kv namespace create ROLODEX
#   npx wrangler kv namespace create ROLODEX --preview
[[kv_namespaces]]
binding = "ROLODEX"
id = "cd3cc5a85bdd4565aadbe996ef7f937c"
preview_id = "432dcadaad684af89ddcef6577393cef"

# Cloudflare Access, path-scoped to /admin only.
#
# Unlike the sibling `now-store` Worker — where an Access application gates the
# entire hostname — this host is mixed: GET /rolodex must stay public for the
# GitHub Pages site. The Access app therefore covers
# `rolodex.michaellamb.dev/admin` (which includes /admin/*), and the Worker
# additionally verifies the signed `Cf-Access-Jwt-Assertion` itself so a missing
# or misconfigured Access app can't silently expose the write API.
#
# ACCESS_AUD is the Application Audience (AUD) tag shown on the Access
# application's overview page in Zero Trust.
#
# There is deliberately no ADMIN_DEV_BYPASS var here: `npm run dev` passes it on
# the command line so it can never be committed as `true` and deployed. Local
# dev needs it because wrangler rewrites request.url to the custom domain below,
# leaving no reliable way to detect a local run from inside the Worker.
[vars]
ACCESS_TEAM_DOMAIN = "michaellamb.cloudflareaccess.com"
ACCESS_AUD = "5f3a9d86e42cb9858ab043e674a988347eac7a9860998e5a28f2bb7bf0677d80"

# Custom domain so the Access application has a hostname to attach to.
[[routes]]
pattern = "rolodex.michaellamb.dev"
zone_name = "michaellamb.dev"
custom_domain = true
